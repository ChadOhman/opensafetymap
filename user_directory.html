<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Directory - Open Safety Map</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .user-actions {
      display: flex;
      gap: var(--space-xs);
      flex-wrap: wrap;
    }
    .search-bar {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      align-items: flex-end;
      margin-bottom: var(--space-lg);
    }
    .search-bar .form-field {
      margin-bottom: 0;
      flex: 1;
      min-width: 160px;
    }
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-md);
      margin-top: var(--space-md);
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" aria-label="Main navigation">
    <a href="/" class="navbar-brand">Open Safety Map</a>
    <ul class="navbar-nav">
      <li><a href="/">Map</a></li>
      <li><a href="moderation_dashboard.html">Moderate</a></li>
      <li><a href="user_directory.html" aria-current="page">Users</a></li>
      <li id="nav-auth"><a href="login.html">Log In</a></li>
      <li><button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme" title="Toggle color theme">&#9681;</button></li>
    </ul>
  </nav>

  <main id="main-content">
    <div class="container">
      <h1>User Directory</h1>

      <div class="search-bar">
        <div class="form-field">
          <label for="searchBox">Search</label>
          <input type="text" id="searchBox" placeholder="Name or email..." aria-label="Search users">
        </div>
        <div class="form-field">
          <label for="roleFilter">Role</label>
          <select id="roleFilter">
            <option value="">All</option>
            <option value="user">User</option>
            <option value="moderator">Moderator</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div class="form-field">
          <label for="statusFilter">Status</label>
          <select id="statusFilter">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="banned">Banned</option>
          </select>
        </div>
        <div class="form-field">
          <button type="button" class="btn" id="applyBtn">Apply</button>
        </div>
      </div>

      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Provider</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="userTableBody"></tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </main>

  <div id="status" role="status" aria-live="polite" class="sr-only"></div>

  <footer style="text-align:center;padding:var(--space-md);font-size:var(--text-xs);color:var(--color-text-secondary);">
    Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
  </footer>

  <script type="module" src="assets/js/user_directory.js"></script>
</body>
</html>
