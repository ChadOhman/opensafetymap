<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open Safety Map</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <style>
    .map-layout {
      display: flex;
      height: calc(100vh - var(--nav-height));
    }
    .map-layout #map {
      flex: 1;
      height: 100%;
    }
    .detail-panel {
      position: fixed;
      top: var(--nav-height);
      right: 0;
      width: 380px;
      height: calc(100vh - var(--nav-height));
      background: var(--color-surface);
      border-left: 1px solid var(--color-border);
      padding: var(--space-lg);
      overflow-y: auto;
      z-index: 500;
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform var(--transition-speed) ease;
    }
    .detail-panel.open {
      transform: translateX(0);
    }
    .detail-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }
    .detail-photos { display: flex; gap: var(--space-sm); flex-wrap: wrap; margin: var(--space-md) 0; }
    .detail-photos img { width: 100px; height: 75px; object-fit: cover; border-radius: var(--radius-sm); }
    .comment-list { margin: var(--space-md) 0; }
    .comment-item { padding: var(--space-sm) 0; border-bottom: 1px solid var(--color-border); }
    .comment-meta { font-size: var(--text-xs); color: var(--color-text-secondary); }
    .severity-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: var(--space-xs); }
    .filter-toggle-btn {
      position: fixed;
      top: calc(var(--nav-height) + var(--space-sm));
      left: var(--space-sm);
      z-index: 600;
    }
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 400;
      background: var(--color-surface);
      border-top: 1px solid var(--color-border);
      padding: var(--space-xs) var(--space-md);
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
      text-align: center;
    }
    @media (max-width: 640px) {
      .detail-panel { width: 100%; }
      .filter-panel { width: 100%; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" aria-label="Main navigation">
    <a href="/" class="navbar-brand">Open Safety Map</a>
    <ul class="navbar-nav">
      <li><a href="report.html">Submit a Report</a></li>
      <li id="nav-moderate" hidden><a href="moderation_dashboard.html">Moderate</a></li>
      <li id="nav-auth"><a href="login.html">Log In</a></li>
      <li><button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme" title="Toggle color theme">&#9681;</button></li>
    </ul>
  </nav>

  <main id="main-content">
    <div class="map-layout">
      <aside class="filter-panel" id="filterPanel" aria-label="Filter reports">
        <div class="filter-panel-header">
          <h2>Filters</h2>
          <button type="button" class="btn btn-sm btn-secondary" id="filterCloseBtn" aria-label="Close filters">&times;</button>
        </div>
        <form id="filterForm">
          <fieldset>
            <legend class="sr-only">Report filters</legend>

            <div class="form-field">
              <label for="filterMode">Reporter Mode</label>
              <select id="filterMode" name="reporter_mode">
                <option value="">All</option>
              </select>
            </div>

            <div class="form-field">
              <label for="filterType">Incident Type</label>
              <select id="filterType" name="incident_type">
                <option value="">All</option>
              </select>
            </div>

            <div class="form-field">
              <label for="filterSeverity">Severity</label>
              <select id="filterSeverity" name="severity">
                <option value="">All</option>
              </select>
            </div>

            <div class="form-field">
              <label for="filterParty">Other Party</label>
              <select id="filterParty" name="other_party">
                <option value="">All</option>
              </select>
            </div>

            <div class="form-field">
              <label for="filterDateFrom">Date From</label>
              <input type="date" id="filterDateFrom" name="date_from">
            </div>

            <div class="form-field">
              <label for="filterDateTo">Date To</label>
              <input type="date" id="filterDateTo" name="date_to">
            </div>

            <div class="form-actions">
              <button type="submit" class="btn">Apply Filters</button>
              <button type="reset" class="btn btn-secondary" id="filterClearBtn">Clear</button>
            </div>
          </fieldset>
        </form>
      </aside>

      <div id="map" role="application" aria-label="Safety incident map"></div>

      <aside class="detail-panel" id="detailPanel" aria-label="Report details" hidden>
        <div class="detail-panel-header">
          <h2 id="detailTitle">Report Details</h2>
          <button type="button" class="btn btn-sm btn-secondary" id="detailCloseBtn" aria-label="Close details">&times;</button>
        </div>
        <div id="detailContent"></div>
      </aside>
    </div>

    <button type="button" class="btn btn-sm filter-toggle-btn" id="filterToggleBtn" aria-label="Toggle filters">Filters</button>
  </main>

  <div id="status" role="status" aria-live="polite" class="sr-only"></div>

  <footer class="site-footer">
    Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
  </footer>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script type="module" src="assets/js/map.js"></script>
</body>
</html>
