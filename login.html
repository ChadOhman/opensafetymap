<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Log In - Open Safety Map</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .login-container {
      max-width: 440px;
      margin: var(--space-xl) auto;
      padding: var(--space-md);
    }
    .login-surface {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .login-surface h1 {
      margin-bottom: var(--space-sm);
    }
    .login-surface .login-intro {
      color: var(--color-text-secondary);
      font-size: var(--text-sm);
      margin-bottom: var(--space-lg);
    }
    .oauth-buttons {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }
    .oauth-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-sm);
      min-height: 48px;
      padding: var(--space-sm) var(--space-lg);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      font-weight: 600;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      cursor: pointer;
      text-decoration: none;
      transition: background var(--transition-speed) ease, transform 100ms ease;
    }
    .oauth-btn:hover { text-decoration: none; transform: scale(0.98); }
    .oauth-btn:active { transform: scale(0.96); }
    .oauth-btn:focus-visible { outline: var(--focus-ring); outline-offset: 2px; }
    .oauth-google {
      background: #ffffff;
      color: #1a1a2e;
      border-color: #dadce0;
    }
    .oauth-google:hover { background: #f8f9fa; }
    .oauth-apple {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }
    .oauth-apple:hover { background: #1a1a1a; }
    .oauth-mastodon {
      background: #6364ff;
      color: #ffffff;
      border-color: #6364ff;
    }
    .oauth-mastodon:hover { background: #5253e0; }
    .oauth-bluesky {
      background: #0085ff;
      color: #ffffff;
      border-color: #0085ff;
    }
    .oauth-bluesky:hover { background: #0070d9; }
    .oauth-icon {
      width: 20px;
      height: 20px;
      font-size: var(--text-lg);
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" aria-label="Main navigation">
    <a href="/" class="navbar-brand">Open Safety Map</a>
    <ul class="navbar-nav">
      <li><a href="/">Map</a></li>
      <li><a href="report.html">Submit a Report</a></li>
      <li><button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle color theme" title="Toggle color theme">&#9681;</button></li>
    </ul>
  </nav>

  <main id="main-content">
    <div class="login-container">
      <div class="login-surface">
        <h1>Log In</h1>
        <p class="login-intro">Sign in to submit reports, track your submissions, and participate in the community.</p>

        <div class="oauth-buttons">
          <a href="/api/auth/google.php" class="oauth-btn oauth-google" id="btnGoogle">
            <span class="oauth-icon" aria-hidden="true">G</span>
            Continue with Google
          </a>
          <a href="/api/auth/apple.php" class="oauth-btn oauth-apple" id="btnApple">
            <span class="oauth-icon" aria-hidden="true">&#63743;</span>
            Continue with Apple
          </a>
          <a href="/api/auth/mastodon.php" class="oauth-btn oauth-mastodon" id="btnMastodon">
            <span class="oauth-icon" aria-hidden="true">M</span>
            Continue with Mastodon
          </a>
          <a href="/api/auth/bluesky.php" class="oauth-btn oauth-bluesky" id="btnBluesky">
            <span class="oauth-icon" aria-hidden="true">B</span>
            Continue with Bluesky
          </a>
        </div>
      </div>
    </div>
  </main>

  <div id="status" role="status" aria-live="polite" class="sr-only"></div>

  <footer style="text-align:center;padding:var(--space-md);font-size:var(--text-xs);color:var(--color-text-secondary);">
    Map data &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
  </footer>

  <script type="module">
    import { initTheme, cycleTheme } from './assets/js/theme.js';

    initTheme();
    document.getElementById('themeToggle').addEventListener('click', () => cycleTheme());

    // Store returnUrl and append to OAuth links
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('returnUrl') || params.get('return') || '/';
    document.querySelectorAll('.oauth-btn').forEach(btn => {
      const url = new URL(btn.href, window.location.origin);
      url.searchParams.set('returnUrl', returnUrl);
      btn.href = url.toString();
    });
  </script>
</body>
</html>
